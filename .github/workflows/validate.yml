name: 🏁 Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      seeds:
        description: 'Number of seeds to test'
        default: '50'

jobs:
  validate:
    name: 🏁 Cross-validate against bbpPairings
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: node

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build
        run: pnpm build

      - name: 🔨 Build bbpPairings from source
        run: |
          git clone --depth 1 https://github.com/BieremaBoyzProgramming/bbpPairings.git /tmp/bbpPairings
          make -C /tmp/bbpPairings -j$(nproc) max_rounds=15
          chmod +x /tmp/bbpPairings/bbpPairings.exe

      - name: 🏁 bbpPairings generates, we check
        run: ./scripts/check-bbp.sh ${{ inputs.seeds || '50' }} /tmp/bbpPairings/bbpPairings.exe

      - name: 🏁 We generate, bbpPairings checks
        run: ./scripts/check-ours.sh ${{ inputs.seeds || '50' }} /tmp/bbpPairings/bbpPairings.exe
